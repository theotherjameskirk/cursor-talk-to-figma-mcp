<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindMax – Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 24px 80px;
      font-family: 'Outfit', sans-serif;
    }
    .phone {
      width: 393px;
      height: 852px;
      background: #000;
      border-radius: 54px;
      overflow: hidden;
      position: relative;
      box-shadow:
        0 0 0 1px #1a1a1a,
        0 0 0 3px #0a0a0a,
        0 0 0 4px #2a2a2a,
        0 60px 120px rgba(0,0,0,0.9);
    }
    .scroll-area {
      height: calc(852px - 108px);
      overflow-y: scroll;
      -webkit-overflow-scrolling: touch;
    }
    .scroll-area::-webkit-scrollbar { display: none; }

    /* ── Typewriter cursor ── */
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: #fff;
      margin-left: 2px;
      vertical-align: text-bottom;
      border-radius: 1px;
      animation: blink 0.7s step-start infinite;
    }

    /* ── Avatar talking pulse ── */
    @keyframes avatarTalk {
      0%   { box-shadow: 0 0 0 0 rgba(117,58,255,0); }
      30%  { box-shadow: 0 0 0 4px rgba(117,58,255,0.55); }
      60%  { box-shadow: 0 0 0 2px rgba(117,58,255,0.25); }
      100% { box-shadow: 0 0 0 0 rgba(117,58,255,0); }
    }
    .avatar-talking {
      animation: avatarTalk 0.35s ease-out;
    }

    /* ── Streak dot animation ── */
    @keyframes dotPop {
      0%   { transform: scale(0); opacity: 0; }
      60%  { transform: scale(1.35); opacity: 1; }
      80%  { transform: scale(0.85); }
      100% { transform: scale(1); }
    }
    @keyframes dotGlow {
      0%, 100% { box-shadow: 0 0 0px rgba(242,128,26,0); }
      50%       { box-shadow: 0 0 8px 2px rgba(242,128,26,0.7); }
    }
    .dot-filled {
      animation: dotPop 0.45s cubic-bezier(0.34,1.56,0.64,1) both,
                 dotGlow 2s ease-in-out 0.5s infinite;
    }
    .dot-empty {
      animation: dotPop 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    /* ── Chip ── */
    .chip {
      background: rgba(102,51,178,0.5);
      border-radius: 11px;
      padding: 4px 12px;
      color: #e5ccff;
      font-size: 12px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      white-space: nowrap;
    }

    /* ── History card ── */
    .history-card {
      background: #1a1429;
      border-radius: 16px;
      display: flex;
      overflow: hidden;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .history-card:active { opacity: 0.75; }

    /* ── Tab button ── */
    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px 0;
    }
  </style>
</head>

function GreetingCard() {
  const fullText = "Great job today James. Excited for tomorrow's lesson.";
  const [displayed, setDisplayed] = useState('');
  const [done, setDone] = useState(false);
  const [talking, setTalking] = useState(false);

  useEffect(() => {
    let i = 0;
    const delay = setTimeout(() => {
      const id = setInterval(() => {
        i++;
        setDisplayed(fullText.slice(0, i));
        // pulse avatar on every ~4th character (word-ish rhythm)
        if (i % 4 === 0) {
          setTalking(true);
          setTimeout(() => setTalking(false), 340);
        }
        if (i >= fullText.length) {
          clearInterval(id);
          setDone(true);
        }
      }, 38);
      return () => clearInterval(id);
    }, 600);
    return () => clearTimeout(delay);
  }, []);

  return (
    <div style={{
      background: '#141414',
      border: '1px solid rgba(255,255,255,0.08)',
      borderRadius: 54,
      padding: '6px 16px 6px 6px',
      display: 'flex', alignItems: 'center', gap: 12,
    }}>
      {/* Avatar – pulses while typing */}
      <img
        src="avatar.png"
        alt="avatar"
        className={talking ? 'avatar-talking' : ''}
        style={{
          width: 61, height: 61, borderRadius: '50%',
          objectFit: 'cover',
          border: '1.5px solid rgba(255,255,255,0.1)',
          flexShrink: 0,
          transition: 'box-shadow 0.1s',
        }}
      />
      {/* Text with typewriter + blinking cursor */}
      <p style={{ color: '#fff', fontSize: 15, fontWeight: 500, lineHeight: 1.35, fontFamily: 'Outfit, sans-serif', minHeight: '2.7em' }}>
        {displayed}
        {!done && <span className="cursor" />}
      </p>
    </div>
  );
}

/* ── Scratch card – reveals tomorrow's lesson ── */
function ScratchCard() {
  const canvasRef = useRef(null);
  const cardRef   = useRef(null);
  const mouseDown = useRef(false);
  const [revealed, setRevealed] = useState(false);
  const [fading,   setFading]   = useState(false);

  const LESSON = {
    title: 'The Art of Deep Focus',
    subtitle: 'Train your brain to enter flow state on demand',
    topics: ['Focus', 'Mindfulness', 'Productivity'],
    emoji: '🎯',
  };

  const initCanvas = () => {
    const canvas = canvasRef.current;
    const card   = cardRef.current;
    if (!canvas || !card) return;
    const { width, height } = card.getBoundingClientRect();
    canvas.width  = width;
    canvas.height = height;
    const ctx = canvas.getContext('2d');

    /* Silver gradient */
    const g = ctx.createLinearGradient(0, 0, width, height);
    g.addColorStop(0,    '#8e8e8e');
    g.addColorStop(0.2,  '#d6d6d6');
    g.addColorStop(0.45, '#b2b2b2');
    g.addColorStop(0.7,  '#e4e4e4');
    g.addColorStop(1,    '#9a9a9a');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, width, height);

    /* Diagonal stripes */
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;
    for (let i = -height; i < width + height; i += 10) {
      ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i + height, height); ctx.stroke();
    }
    ctx.restore();

    /* Noise */
    ctx.save();
    for (let i = 0; i < 400; i++) {
      ctx.fillStyle = `rgba(0,0,0,${Math.random() * 0.06})`;
      ctx.beginPath();
      ctx.arc(Math.random() * width, Math.random() * height, Math.random() * 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    /* Label */
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.2)'; ctx.shadowBlur = 4;
    ctx.fillStyle = 'rgba(50,25,0,0.55)';
    ctx.font = `bold 14px 'Outfit', sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('✦  SCRATCH TO REVEAL  ✦', width / 2, height / 2 - 11);
    ctx.font = `12px 'Outfit', sans-serif`;
    ctx.fillStyle = 'rgba(50,25,0,0.4)';
    ctx.fillText("Tomorrow's lesson awaits", width / 2, height / 2 + 11);
    ctx.restore();
  };

  useEffect(() => { if (!revealed) requestAnimationFrame(initCanvas); }, []);

  const getPos = (e) => {
    const canvas = canvasRef.current;
    const rect   = canvas.getBoundingClientRect();
    const src    = e.touches ? e.touches[0] : e;
    return {
      x: (src.clientX - rect.left) * (canvas.width  / rect.width),
      y: (src.clientY - rect.top)  * (canvas.height / rect.height),
    };
  };

  const doScratch = (e) => {
    const canvas = canvasRef.current;
    if (!canvas || revealed) return;
    const ctx = canvas.getContext('2d');
    const { x, y } = getPos(e);
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath(); ctx.arc(x, y, 28, 0, Math.PI * 2); ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
  };

  const checkReveal = () => {
    const canvas = canvasRef.current;
    if (!canvas || revealed || fading) return;
    const data = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height).data;
    let gone = 0;
    for (let i = 3; i < data.length; i += 4) { if (data[i] < 128) gone++; }
    if (gone / (canvas.width * canvas.height) > 0.45) {
      setFading(true);
      setTimeout(() => setRevealed(true), 650);
    }
  };

  return (
    <div ref={cardRef} style={{ position: 'relative', borderRadius: 20, overflow: 'hidden', background: '#1a1429' }}>
      {/* ── Lesson reveal content ── */}
      {/* Image / hero area */}
      <div style={{
        background: 'linear-gradient(135deg, #1e0e4a 0%, #2d1b69 45%, #1a3a6e 100%)',
        height: 130, position: 'relative', overflow: 'hidden',
        display: 'flex', flexDirection: 'column',
        alignItems: 'center', justifyContent: 'center', gap: 6,
      }}>
        <div style={{ position: 'absolute', top: -20, right: -20, width: 110, height: 110, borderRadius: '50%', background: 'rgba(117,58,255,0.2)' }} />
        <div style={{ position: 'absolute', bottom: -30, left: 10, width: 90, height: 90, borderRadius: '50%', background: 'rgba(26,99,110,0.25)' }} />
        <span style={{ fontSize: 50, lineHeight: 1, position: 'relative', zIndex: 1 }}>{LESSON.emoji}</span>
        <span style={{ color: 'rgba(255,255,255,0.45)', fontSize: 11, fontWeight: 600, fontFamily: 'Outfit, sans-serif', letterSpacing: 1.5, textTransform: 'uppercase', position: 'relative', zIndex: 1 }}>Tomorrow's Lesson</span>
      </div>

      {/* Text + chips */}
      <div style={{ padding: '14px 16px 16px' }}>
        <p style={{ color: '#fff', fontSize: 17, fontWeight: 600, fontFamily: 'Outfit, sans-serif', lineHeight: 1.3, marginBottom: 6 }}>{LESSON.title}</p>
        <p style={{ color: '#b8b8b8', fontSize: 14, fontFamily: 'Outfit, sans-serif', lineHeight: 1.35, marginBottom: 12 }}>{LESSON.subtitle}</p>
        <div style={{ display: 'flex', gap: 6, flexWrap: 'nowrap', overflow: 'hidden' }}>
          {LESSON.topics.map(t => <span key={t} className="chip">{t}</span>)}
        </div>
      </div>

      {/* ── Scratch canvas overlay ── */}
      {!revealed && (
        <canvas
          ref={canvasRef}
          style={{
            position: 'absolute', top: 0, left: 0,
            cursor: 'crosshair', touchAction: 'none',
            opacity: fading ? 0 : 1,
            transition: fading ? 'opacity 0.65s ease-out' : 'none',
            pointerEvents: fading ? 'none' : 'auto',
          }}
          onMouseDown={(e) => { mouseDown.current = true; doScratch(e); }}
          onMouseMove={(e) => { if (mouseDown.current) { doScratch(e); checkReveal(); } }}
          onMouseUp={() => { mouseDown.current = false; }}
          onMouseLeave={() => { mouseDown.current = false; }}
          onTouchStart={(e) => { e.preventDefault(); doScratch(e); }}
          onTouchMove={(e) => { e.preventDefault(); doScratch(e); checkReveal(); }}
          onTouchEnd={checkReveal}
        />
      )}
    </div>
  );
}

          <button style={{ background: 'none', border: 'none', cursor: 'pointer', color: '#fff', fontSize: 22, lineHeight: 1, padding: '0 2px' }}>▶</button>
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display: 'flex', padding: '4px 0 0' }}>
        {tabs.map(t => (
          <button key={t.label} className="tab-btn" onClick={() => setActive(t.label)}>
            <span style={{ color: active === t.label ? '#fff' : 'rgba(255,255,255,0.45)', display: 'flex' }}>
              {t.icon}
            </span>
            <span style={{ color: active === t.label ? '#fff' : 'rgba(255,255,255,0.45)', fontSize: 12, fontFamily: 'Outfit, sans-serif' }}>{t.label}</span>
          </button>
        ))}
      </div>

      {/* Home indicator */}
      <div style={{ display: 'flex', justifyContent: 'center', padding: '8px 0 10px' }}>
        <div style={{ width: 134, height: 5, background: '#fff', borderRadius: 100 }} />
      </div>
    </div>
  );
}

  return (
    <svg width="24" height="22" viewBox="0 0 24 22" fill="currentColor">
      <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
    </svg>
  );
}
function CreateIcon() {
  return (
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
      <rect x="1" y="1" width="20" height="20" rx="4"/>
      <line x1="11" y1="6" x2="11" y2="16"/>
      <line x1="6" y1="11" x2="16" y2="11"/>
    </svg>

}
function LearnIcon() {
  return (
    <svg width="24" height="22" viewBox="0 0 24 22" fill="currentColor">
      <path d="M12 3L1 9l4 2.18V17h14v-5.82L23 9 12 3zm6 12H6v-4.5l6 3.27 6-3.27V15zm0-7.15L12 11.17 6 7.85 12 5l6 2.85z"/>
    </svg>
  );
}

/* ─── Main App ──────────────────────────────────────────── */
function MindMaxHome() {
  const [timeLeft, setTimeLeft] = useState({ h: 11, m: 29, s: 34 });

  useEffect(() => {
    const id = setInterval(() => {
      setTimeLeft(({ h, m, s }) => {
        s--;
        if (s < 0) { s = 59; m--; }
        if (m < 0) { m = 59; h--; }
        if (h < 0) return { h: 0, m: 0, s: 0 };
        return { h, m, s };
      });
    }, 1000);
    return () => clearInterval(id);
  }, []);

  return (
    <div className="phone">
      <StatusBar />
      <NavBar />

      <div className="scroll-area" style={{ padding: '0 13px' }}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8, paddingBottom: 180 }}>
          <GreetingCard />
          <CountdownCard timeLeft={timeLeft} />
          <ScratchCard />
          <RecipeCard />
          <StreakModule />
          <HistorySection />
        </div>
      </div>

      <TabBar />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<MindMaxHome />);
</script>
</body>
</html>
